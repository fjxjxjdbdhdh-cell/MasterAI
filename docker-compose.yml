version: '3.8'

services:
  master-ai:
    build: .
    container_name: master_ai
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
    env_file:
      - .env
    volumes:
      - ./ai_state:/app/ai_state
      - ./trading.db:/app/trading.db
      - ./backups:/backups
      - /tmp/.X11-unix:/tmp/.X11-unix  # для GUI MT5 (опционально)
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
